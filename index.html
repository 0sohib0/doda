<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الدودة الذكية - مسار هاملتوني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #111b24 0%, #050608 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            padding: 10px;
        }

        .header-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            gap: 10px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            width: 100%;
            justify-content: space-around;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 12px; color: #00ff88; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 8px rgba(0, 255, 136, 0.4); }

        .buttons-container {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-button {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-button.active {
            background: #00ff88; color: #111; box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .apple-button { border-color: #ff3366; color: #ff3366; }
        .apple-button:hover { background: #ff3366; color: #fff; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }

        #canvasContainer {
            position: relative;
            width: 100%;
            flex-grow: 1;
            max-width: 800px;
            margin-bottom: 10px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
            border: 2px solid rgba(0, 255, 136, 0.2);
            width: 100%;
            height: 100%;
            display: block;
        }

        #gameOverScreen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 10, 0.95);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #ff3366;
            text-align: center;
            display: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.5);
            z-index: 10;
            width: 80%;
            max-width: 300px;
        }

        #gameOverScreen h2 { color: #ff3366; font-size: 24px; margin-bottom: 10px; }
        .restart-btn {
            margin-top: 15px; padding: 10px 20px; font-size: 16px;
            font-family: 'Cairo', sans-serif; font-weight: bold;
            color: #111; background: #00ff88; border: none;
            border-radius: 6px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="glass-panel">
            <div class="stat-box">
                <div class="stat-label">النتيجة</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">النمط</div>
                <div class="stat-value" id="currentMode" style="color: #00ff88; font-size: 16px; margin-top: 5px;">يدوي 👤</div>
            </div>
        </div>
        
        <div class="buttons-container">
            <button class="mode-button apple-button" onclick="addAppleBtnClick()">إضافة تفاحة 🍎</button>
            <button class="mode-button" id="aiBtn" onclick="toggleAIMode()">تشغيل البوت 🤖</button>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>انتهت اللعبة!</h2>
            <p>النتيجة: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="resetGame()">إلعب مجدداً</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20; 
        let snake = [];
        let score = 0;
        let dx = -gridSize; // تبدأ متجهة لليسار
        let dy = 0;        
        let foods = []; 
        let changingDirection = false;
        let gameLoopTimeout;
        let isAIMode = false;

        function resizeCanvas() {
            const container = document.getElementById("canvasContainer");
            
            // يجب أن يكون عدد الأعمدة زوجياً لكي تعمل الخوارزمية المنظمة بلا أخطاء
            let cols = Math.floor(container.clientWidth / gridSize);
            if (cols % 2 !== 0) cols -= 1; 
            canvas.width = cols * gridSize;

            let rows = Math.floor(container.clientHeight / gridSize);
            canvas.height = rows * gridSize;
        }

        function initGame() {
            resizeCanvas();
            
            // نضع الدودة في مسار العودة (الصف العلوي) لتبدأ دورتها المنظمة بشكل صحيح
            snake = [
                { x: gridSize * 2, y: 0 },
                { x: gridSize * 3, y: 0 },
                { x: gridSize * 4, y: 0 }
            ];
            
            score = 0; dx = -gridSize; dy = 0; foods = [];
            
            document.getElementById('score').innerText = score;
            document.getElementById('gameOverScreen').style.display = 'none';
            addRandomFood(); main();
        }

        document.addEventListener("keydown", changeDirection);

        function toggleAIMode() {
            isAIMode = !isAIMode;
            const btn = document.getElementById("aiBtn");
            const modeText = document.getElementById("currentMode");
            
            if (isAIMode) {
                btn.innerText = "إيقاف البوت 👤"; btn.classList.add("active");
                modeText.innerText = "منظم 🤖"; modeText.style.color = "#ffaa00";
            } else {
                btn.innerText = "تشغيل البوت 🤖"; btn.classList.remove("active");
                modeText.innerText = "يدوي 👤"; modeText.style.color = "#00ff88";
            }
        }

        // إضافة تفاحة واحدة فقط عند الضغط
        function addAppleBtnClick() { 
            addRandomFood(); 
        }

        function main() {
            if (hasGameEnded()) {
                document.getElementById('finalScore').innerText = score;
                document.getElementById('gameOverScreen').style.display = 'block';
                return;
            }
            changingDirection = false;
            
            if (isAIMode) runAIPerfectPattern();

            // السرعة 30 ملي ثانية لتكون سريعة وممتعة للمشاهدة
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas(); drawFoods(); advanceSnake(); drawSnake(); main();
            }, 30);
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // خوارزمية المسار المنظم (لن تخسر أبداً لأنها تمسح الشاشة بخطوط متوازية)
        function runAIPerfectPattern() {
            const head = snake[0];
            const max_x = canvas.width - gridSize;
            const max_y = canvas.height - gridSize;
            const x = head.x;
            const y = head.y;

            // القاعدة 1: الصف العلوي مخصص للعودة لليسار
            if (y === 0) {
                if (x > 0) {
                    dx = -gridSize; dy = 0; // تحرك يساراً
                } else {
                    dx = 0; dy = gridSize; // عندما تصل للزاوية (0,0)، انزل لأسفل
                }
            }
            // القاعدة 2: الأعمدة الزوجية (0، 2، 4...) تتحرك للأسفل
            else if ((x / gridSize) % 2 === 0) {
                if (y < max_y) {
                    dx = 0; dy = gridSize; // تحرك لأسفل
                } else {
                    dx = gridSize; dy = 0; // عند الوصول للقاع، خذ خطوة لليمين للعمود الفردي
                }
            }
            // القاعدة 3: الأعمدة الفردية (1، 3، 5...) تتحرك للأعلى
            else {
                if (y > gridSize) {
                    dx = 0; dy = -gridSize; // تحرك للأعلى
                } else {
                    // عند الوصول لأسفل صف العودة مباشرة (y = gridSize)
                    if (x < max_x) {
                        dx = gridSize; dy = 0; // خذ خطوة لليمين للعمود الزوجي
                    } else {
                        dx = 0; dy = -gridSize; // إذا كان هذا آخر عمود في الشاشة، اصعد لصف العودة للبدء من جديد
                    }
                }
            }
        }

        function drawSnake() { snake.forEach(drawSnakePart); }

        function drawSnakePart(snakePart, index) {
            const isHead = index === 0;
            const centerX = snakePart.x + gridSize / 2;
            const centerY = snakePart.y + gridSize / 2;
            const radius = gridSize / 2 - 1;

            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            if (isHead) {
                ctx.fillStyle = "#00ff88"; ctx.shadowColor = "#00ff88"; ctx.shadowBlur = 8;
            } else {
                ctx.fillStyle = "#00cc6a"; ctx.shadowBlur = 0;
            }
            ctx.fill(); ctx.closePath();

            if (isHead) drawEyes(centerX, centerY);
        }

        function drawEyes(x, y) {
            ctx.fillStyle = "white";
            let eye1X, eye1Y, eye2X, eye2Y;
            const offset = 4;
            if (dx > 0) { eye1X = x + offset; eye1Y = y - offset; eye2X = x + offset; eye2Y = y + offset; } 
            else if (dx < 0) { eye1X = x - offset; eye1Y = y - offset; eye2X = x - offset; eye2Y = y + offset; } 
            else if (dy > 0) { eye1X = x - offset; eye1Y = y + offset; eye2X = x + offset; eye2Y = y + offset; } 
            else { eye1X = x - offset; eye1Y = y - offset; eye2X = x + offset; eye2Y = y - offset; }
            ctx.beginPath(); ctx.arc(eye1X, eye1Y, 3, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(eye2X, eye2Y, 3, 0, 2 * Math.PI); ctx.fill();
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 

            let eatenIndex = foods.findIndex(f => snake[0].x === f.x && snake[0].y === f.y);
            if (eatenIndex !== -1) {
                score += 10; document.getElementById('score').innerText = score;
                foods.splice(eatenIndex, 1); addRandomFood();
            } else {
                snake.pop(); 
            }
        }

        function drawFoods() {
            foods.forEach(food => {
                const cx = food.x + gridSize / 2, cy = food.y + gridSize / 2, r = gridSize / 2 - 2;
                ctx.shadowColor = "#ff3366"; ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.fillStyle = "#ff3366"; ctx.fill(); ctx.closePath();
                ctx.shadowBlur = 0; 
            });
        }

        function addRandomFood() {
            const maxX = (canvas.width - gridSize) / gridSize;
            const maxY = (canvas.height - gridSize) / gridSize;
            let nx, ny, valid = false, attempts = 0;

            while (!valid && attempts < 100) {
                nx = Math.floor(Math.random() * maxX) * gridSize;
                ny = Math.floor(Math.random() * maxY) * gridSize;
                valid = !snake.some(p => p.x === nx && p.y === ny) && !foods.some(f => f.x === nx && f.y === ny);
                attempts++;
            }
            if (valid) foods.push({ x: nx, y: ny });
        }

        function changeDirection(event) {
            if (isAIMode) return;
            const key = event.keyCode;
            const goingUp = dy === -gridSize, goingDown = dy === gridSize, goingRight = dx === gridSize, goingLeft = dx === -gridSize;
            if (changingDirection) return;

            if (key === 37 && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            if (key === 38 && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            if (key === 39 && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            if (key === 40 && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        function resetGame() { clearTimeout(gameLoopTimeout); initGame(); }
        
        window.addEventListener('resize', () => { clearTimeout(gameLoopTimeout); initGame(); });
        initGame();
    </script>
</body>
</html>
