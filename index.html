<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الدودة الذكية V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #111b24 0%, #050608 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            padding: 10px;
        }

        .header-panel {
            display: flex;
            flex-direction: column; /* تحسين العرض للهواتف */
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            gap: 10px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            width: 100%;
            justify-content: space-around;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 12px; color: #00ff88; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 8px rgba(0, 255, 136, 0.4); }

        .buttons-container {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap; /* السماح بالتفاف الأزرار في الهواتف */
        }

        .mode-button {
            flex: 1;
            min-width: 140px;
            padding: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid #00ff88;
            background: transparent;
            color: #00ff88;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .mode-button.active {
            background: #00ff88; color: #111; box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
        }

        .apple-button { border-color: #ff3366; color: #ff3366; }
        .apple-button:hover { background: #ff3366; color: #fff; box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); }

        #canvasContainer {
            position: relative;
            width: 100%;
            flex-grow: 1;
            max-width: 800px;
            margin-bottom: 10px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
            border: 2px solid rgba(0, 255, 136, 0.2);
            width: 100%;
            height: 100%;
            display: block;
        }

        #gameOverScreen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 10, 0.95);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #ff3366;
            text-align: center;
            display: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.5);
            z-index: 10;
            width: 80%;
            max-width: 300px;
        }

        #gameOverScreen h2 { color: #ff3366; font-size: 24px; margin-bottom: 10px; }
        .restart-btn {
            margin-top: 15px; padding: 10px 20px; font-size: 16px;
            font-family: 'Cairo', sans-serif; font-weight: bold;
            color: #111; background: #00ff88; border: none;
            border-radius: 6px; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="glass-panel">
            <div class="stat-box">
                <div class="stat-label">النتيجة</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">النمط</div>
                <div class="stat-value" id="currentMode" style="color: #00ff88; font-size: 16px; margin-top: 5px;">يدوي 👤</div>
            </div>
        </div>
        
        <div class="buttons-container">
            <button class="mode-button apple-button" onclick="addAppleBtnClick()">تفاحة 🍎</button>
            <button class="mode-button" id="aiBtn" onclick="toggleAIMode()">الذكاء الاصطناعي 🤖</button>
        </div>
    </div>

    <div id="canvasContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameOverScreen">
            <h2>انتهت اللعبة!</h2>
            <p>النتيجة: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="resetGame()">إلعب مجدداً</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20; 
        let snake = [];
        let score = 0;
        let dx = gridSize; 
        let dy = 0;        
        let foods = []; 
        let changingDirection = false;
        let gameLoopTimeout;
        let isAIMode = false;

        function resizeCanvas() {
            const container = document.getElementById("canvasContainer");
            canvas.width = Math.floor(container.clientWidth / gridSize) * gridSize;
            canvas.height = Math.floor(container.clientHeight / gridSize) * gridSize;
        }

        function initGame() {
            resizeCanvas();
            const startX = Math.floor((canvas.width / 2) / gridSize) * gridSize;
            const startY = Math.floor((canvas.height / 2) / gridSize) * gridSize;

            snake = [
                { x: startX, y: startY },
                { x: startX - gridSize, y: startY },
                { x: startX - gridSize * 2, y: startY }
            ];
            score = 0; dx = gridSize; dy = 0; foods = [];
            
            document.getElementById('score').innerText = score;
            document.getElementById('gameOverScreen').style.display = 'none';
            addRandomFood(); main();
        }

        document.addEventListener("keydown", changeDirection);

        function toggleAIMode() {
            isAIMode = !isAIMode;
            const btn = document.getElementById("aiBtn");
            const modeText = document.getElementById("currentMode");
            
            if (isAIMode) {
                btn.innerText = "إيقاف البوت 👤"; btn.classList.add("active");
                modeText.innerText = "تلقائي 🤖"; modeText.style.color = "#ffaa00";
            } else {
                btn.innerText = "تشغيل البوت 🤖"; btn.classList.remove("active");
                modeText.innerText = "يدوي 👤"; modeText.style.color = "#00ff88";
            }
        }

        function addAppleBtnClick() { addRandomFood(); addRandomFood(); }

        function main() {
            if (hasGameEnded()) {
                document.getElementById('finalScore').innerText = score;
                document.getElementById('gameOverScreen').style.display = 'block';
                return;
            }
            changingDirection = false;
            if (isAIMode) runAI();

            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas(); drawFoods(); advanceSnake(); drawSnake(); main();
            }, 70);
        }

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // دالة مساعدة للذكاء الاصطناعي لفحص ما إذا كان المربع آمناً
        function isSafe(x, y) {
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return false;
            for (let i = 0; i < snake.length - 1; i++) { // نستثني الذيل لأنه سيتحرك
                if (snake[i].x === x && snake[i].y === y) return false;
            }
            return true;
        }

        // دالة تحسب عدد المسارات الحرة المتاحة (الرؤية المستقبلية)
        function countFreeSpaces(x, y) {
            let free = 0;
            if (isSafe(x + gridSize, y)) free++;
            if (isSafe(x - gridSize, y)) free++;
            if (isSafe(x, y + gridSize)) free++;
            if (isSafe(x, y - gridSize)) free++;
            return free;
        }

        // خوارزمية الذكاء الاصطناعي المطورة (V2)
        function runAI() {
            const head = snake[0];
            if (foods.length === 0) return;

            let targetFood = foods[0];
            let minDistanceToFood = Infinity;

            for (let i = 0; i < foods.length; i++) {
                const dist = Math.abs(head.x - foods[i].x) + Math.abs(head.y - foods[i].y);
                if (dist < minDistanceToFood) {
                    minDistanceToFood = dist; targetFood = foods[i];
                }
            }

            const directions = [
                { x: gridSize, y: 0 }, { x: -gridSize, y: 0 },
                { x: 0, y: gridSize }, { x: 0, y: -gridSize }
            ];

            let bestDir = null;
            let bestScore = -Infinity; // نظام تنقيط لاختيار أفضل حركة

            for (const dir of directions) {
                if (dir.x === -dx && dir.y === -dy) continue; // لا تعود للخلف

                const nextX = head.x + dir.x;
                const nextY = head.y + dir.y;

                if (!isSafe(nextX, nextY)) continue;

                const distance = Math.abs(nextX - targetFood.x) + Math.abs(nextY - targetFood.y);
                const freeSpaces = countFreeSpaces(nextX, nextY); // التفكير للمستقبل

                // التنقيط: نفضل المسافة الأقصر، ولكننا نعطي أولوية قصوى للمساحات المفتوحة لتجنب الحصار
                let moveScore = -distance; // المسافة الأقل أفضل
                
                if (freeSpaces === 0) {
                    moveScore -= 10000; // مسار مسدود! تجنبه بأي ثمن
                } else if (freeSpaces === 1) {
                    moveScore -= 1000;  // مسار خطير (قد يكون نفقاً)
                } else {
                    moveScore += freeSpaces * 10; // مكافأة للمسارات المفتوحة
                }

                if (moveScore > bestScore) {
                    bestScore = moveScore;
                    bestDir = dir;
                }
            }

            // إذا وجد مساراً أفضل، قم بتغيير الاتجاه
            if (bestDir) {
                dx = bestDir.x; dy = bestDir.y;
            }
        }

        function drawSnake() { snake.forEach(drawSnakePart); }

        function drawSnakePart(snakePart, index) {
            const isHead = index === 0;
            const centerX = snakePart.x + gridSize / 2;
            const centerY = snakePart.y + gridSize / 2;
            const radius = gridSize / 2 - 1;

            ctx.beginPath(); ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            if (isHead) {
                ctx.fillStyle = "#00ff88"; ctx.shadowColor = "#00ff88"; ctx.shadowBlur = 8;
            } else {
                ctx.fillStyle = "#00cc6a"; ctx.shadowBlur = 0;
            }
            ctx.fill(); ctx.closePath();

            if (isHead) drawEyes(centerX, centerY);
        }

        function drawEyes(x, y) {
            ctx.fillStyle = "white";
            let eye1X, eye1Y, eye2X, eye2Y;
            const offset = 4;
            if (dx > 0) { eye1X = x + offset; eye1Y = y - offset; eye2X = x + offset; eye2Y = y + offset; } 
            else if (dx < 0) { eye1X = x - offset; eye1Y = y - offset; eye2X = x - offset; eye2Y = y + offset; } 
            else if (dy > 0) { eye1X = x - offset; eye1Y = y + offset; eye2X = x + offset; eye2Y = y + offset; } 
            else { eye1X = x - offset; eye1Y = y - offset; eye2X = x + offset; eye2Y = y - offset; }
            ctx.beginPath(); ctx.arc(eye1X, eye1Y, 3, 0, 2 * Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(eye2X, eye2Y, 3, 0, 2 * Math.PI); ctx.fill();
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); 

            let eatenIndex = foods.findIndex(f => snake[0].x === f.x && snake[0].y === f.y);
            if (eatenIndex !== -1) {
                score += 10; document.getElementById('score').innerText = score;
                foods.splice(eatenIndex, 1); addRandomFood();
            } else {
                snake.pop(); 
            }
        }

        function drawFoods() {
            foods.forEach(food => {
                const cx = food.x + gridSize / 2, cy = food.y + gridSize / 2, r = gridSize / 2 - 2;
                ctx.shadowColor = "#ff3366"; ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.fillStyle = "#ff3366"; ctx.fill(); ctx.closePath();
                ctx.shadowBlur = 0; 
            });
        }

        function addRandomFood() {
            const maxX = (canvas.width - gridSize) / gridSize;
            const maxY = (canvas.height - gridSize) / gridSize;
            let nx, ny, valid = false, attempts = 0;

            while (!valid && attempts < 100) {
                nx = Math.floor(Math.random() * maxX) * gridSize;
                ny = Math.floor(Math.random() * maxY) * gridSize;
                valid = !snake.some(p => p.x === nx && p.y === ny) && !foods.some(f => f.x === nx && f.y === ny);
                attempts++;
            }
            if (valid) foods.push({ x: nx, y: ny });
        }

        function changeDirection(event) {
            if (isAIMode) return;
            const key = event.keyCode;
            const goingUp = dy === -gridSize, goingDown = dy === gridSize, goingRight = dx === gridSize, goingLeft = dx === -gridSize;
            if (changingDirection) return;

            if (key === 37 && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            if (key === 38 && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            if (key === 39 && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            if (key === 40 && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        function resetGame() { clearTimeout(gameLoopTimeout); initGame(); }
        
        window.addEventListener('resize', () => { clearTimeout(gameLoopTimeout); initGame(); });
        initGame();
    </script>
</body>
</html>
